name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes (GitHub minimum)
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://studybuddy-api-s1bx.onrender.com/health
          echo "Pinged studybuddy-api-s1bx.onrender.com at $(date)"
