name: Keep Render Backend Alive

on:
  schedule:
    # GitHub Actions minimum schedule interval is 5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        env:
          HEALTHCHECK_URL: https://studybuddy-go-backend.onrender.com/api/health
        run: |
          set -euo pipefail
          STATUS_CODE=$(curl -sS -L \
            --connect-timeout 15 \
            --max-time 120 \
            --retry 2 \
            --retry-delay 3 \
            --output /dev/null \
            --write-out "%{http_code}" \
            "$HEALTHCHECK_URL")

          echo "Pinged $HEALTHCHECK_URL at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "HTTP status: $STATUS_CODE"

          if [[ "$STATUS_CODE" != "200" ]]; then
            echo "Healthcheck failed"
            exit 1
          fi
