services:
  - type: web
    name: studybuddy-go-backend
    env: go
    rootDir: backend
    buildCommand: go mod download && go build -o studybuddy-api main.go
    startCommand: ./studybuddy-api
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set this securely in the Render dashboard!
